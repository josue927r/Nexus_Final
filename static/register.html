<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse | Farmacia de lo Alto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=25">
</head>

<body class="login-body">
    <div class="login-container" style="max-width: 500px;">
        <div class="login-card" style="padding: 30px;">
            <div class="login-header">
                <h3>Nexus - Farmacia de lo Alto</h3>
                <!-- Robot Icon (SVG) -->
                <div class="robot-icon">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="robotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#4FD1C5;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#319795;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <!-- Head -->
                        <path fill="url(#robotGrad)" d="M60,80 Q60,30 100,30 Q140,30 140,80 L140,100 L60,100 Z" />
                        <!-- Face -->
                        <rect x="70" y="50" width="60" height="40" rx="10" fill="white" />
                        <!-- Eyes -->
                        <circle cx="85" cy="65" r="5" fill="#2C5282" />
                        <circle cx="115" cy="65" r="5" fill="#2C5282" />
                        <!-- Body -->
                        <path fill="url(#robotGrad)" d="M65,110 L135,110 L130,160 Q100,180 70,160 Z" />
                        <!-- Cross -->
                        <rect x="90" y="125" width="20" height="20" fill="white" rx="2" />
                        <rect x="97" y="120" width="6" height="30" fill="#4FD1C5" />
                        <rect x="85" y="132" width="30" height="6" fill="#4FD1C5" />
                    </svg>
                </div>
                <h2>Crear una nueva cuenta</h2>
                <div class="divider"></div>
            </div>

            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 30px;">
                <p style="color: var(--text-muted); text-align: center; margin-bottom: 25px; max-width: 350px; font-size: 0.95rem; line-height: 1.5;">
                    Ingresa un nombre de usuario y una contraseña segura para habilitar el acceso al panel.
                </p>
                <div style="width: 100%; max-width: 380px;">
                    <form id="register-form" autocomplete="off">
                        <div class="input-group">
                            <label for="username">Usuario:</label>
                            <div class="input-wrapper">
                                <svg xmlns="http://www.w3.org/2000/svg" class="input-icon" viewBox="0 0 20 20"
                                    fill="currentColor">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                                        clip-rule="evenodd" />
                                </svg>
                                <input type="text" id="username" name="username" class="form-input"
                                    placeholder="Nombre Usuario" required autocomplete="off">
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="password">Contraseña:</label>
                            <div class="input-wrapper">
                                <svg xmlns="http://www.w3.org/2000/svg" class="input-icon" viewBox="0 0 20 20"
                                    fill="currentColor">
                                    <path fill-rule="evenodd"
                                        d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                                        clip-rule="evenodd" />
                                </svg>
                                <input type="password" id="password" name="password" class="form-input"
                                    placeholder="•••••••••" required minlength="6" autocomplete="new-password">
                            </div>
                        </div>
                        <button type="submit" class="btn-primary btn-block">Registrar cuenta</button>
                    </form>
                    <div id="error-msg" class="error-message" style="display:none;"></div>
                </div>
            </div>

            <div class="login-footer">
                <a href="/login" style="font-size: 1rem; color: #4FD1C5; font-weight: 600;">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert("¡Cuenta creada exitosamente! Ahora puedes iniciar sesión.");
                    window.location.href = '/login';
                } else {
                    const data = await response.json();
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = data.detail || "Error al registrar usuario";
                }
            } catch (error) {
                console.error('Error:', error);
                errorMsg.style.display = 'block';
                errorMsg.textContent = "Error de conexión";
            }
        });
    </script>
</body>

</html>
